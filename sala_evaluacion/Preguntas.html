<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Componentes: Preguntas - Sala de Evaluación</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-10">
    <section class="max-w-4xl mx-auto space-y-6">
        <h1 class="text-2xl font-bold uppercase mb-4">Bloque de Preguntas</h1>
        <article class="bg-white border-2 border-black p-6 relative">
            <div class="absolute -left-4 -top-4 bg-black text-white w-10 h-10 flex items-center justify-center font-bold text-lg border-2 border-black">1</div>
            <p class="font-bold text-lg mb-6">¿Cuál es la anotación correcta en Spring Boot para definir un controlador REST?</p>
            <div class="space-y-3">
                <label class="flex items-center p-3 border-2 border-gray-300 hover:border-black hover:bg-gray-50 cursor-pointer">
                    <input type="radio" name="q1" value="a" class="mr-4">
                    <span class="font-bold font-mono text-sm">@Controller</span>
                </label>
                <label class="flex items-center p-3 border-2 border-black bg-gray-100 cursor-pointer">
                    <input type="radio" name="q1" value="b" class="mr-4" checked>
                    <span class="font-bold font-mono text-sm">@RestController</span>
                </label>
            </div>
        </article>
        <article class="bg-white border-2 border-black p-6 relative">
            <div class="absolute -left-4 -top-4 bg-white text-black w-10 h-10 flex items-center justify-center font-bold text-lg border-2 border-black">2</div>
            <p class="font-bold text-lg mb-6">El patrón de inyección de dependencias en Spring obliga al desarrollador a instanciar manualmente.</p>
            <div class="grid grid-cols-2 gap-4">
                <label class="flex flex-col items-center justify-center p-4 border-2 border-gray-300 hover:border-black cursor-pointer text-center uppercase font-bold">Verdadero
                    <input type="radio" name="q2" value="true" class="mt-2">
                </label>
                <label class="flex flex-col items-center justify-center p-4 border-2 border-gray-300 hover:border-black cursor-pointer text-center uppercase font-bold">Falso
                    <input type="radio" name="q2" value="false" class="mt-2">
                </label>
            </div>
        </article>
    </section>
</body>
</html>
