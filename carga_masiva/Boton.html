<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Componentes: Botones - Carga Masiva</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-10">
    <section class="max-w-xl mx-auto space-y-6">
        <h1 class="text-2xl font-bold uppercase mb-4">Botones de Carga Masiva</h1>
        <button class="w-full bg-white text-black border-2 border-black px-6 py-2 font-bold uppercase text-sm hover:bg-gray-100 transition-colors flex items-center justify-center">
            <i class="fa-solid fa-download mr-2"></i> Plantilla_Alumnos.xlsx
        </button>
        <button class="w-full bg-black text-white border-2 border-black py-4 font-bold uppercase text-sm tracking-widest hover:bg-gray-800 transition-colors btn-wire shadow-[4px_4px_0_0_rgba(156,163,175,1)] flex items-center justify-center">
            <i class="fa-solid fa-gears mr-2"></i> Procesar Archivo
        </button>
        <button class="w-full bg-white text-black border-2 border-black px-4 py-2 font-bold uppercase text-xs hover:bg-gray-100 transition-colors inline-flex items-center justify-center">
            <i class="fa-solid fa-file-pdf mr-2"></i> Descargar Credenciales
        </button>
    </section>
</body>
</html>
