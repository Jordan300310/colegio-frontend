<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Componentes: Tarjetas - Progreso Individual</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-10">
    <section class="max-w-5xl mx-auto space-y-6">
        <h1 class="text-2xl font-bold uppercase mb-4">Resumen de KPI</h1>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="bg-white border-2 border-black p-4 text-center">
                <p class="text-xs font-bold text-gray-500 uppercase mb-1">Avance del Curso</p>
                <p class="text-3xl font-bold">65%</p>
            </div>
            <div class="bg-white border-2 border-black p-4 text-center">
                <p class="text-xs font-bold text-gray-500 uppercase mb-1">Tiempo Invertido</p>
                <p class="text-3xl font-bold">12.5 <span class="text-sm">hrs</span></p>
            </div>
            <div class="bg-white border-2 border-black p-4 text-center">
                <p class="text-xs font-bold text-gray-500 uppercase mb-1">Promedio Notas</p>
                <p class="text-3xl font-bold">18.5</p>
            </div>
            <div class="bg-white border-2 border-black p-4 text-center">
                <p class="text-xs font-bold text-gray-500 uppercase mb-1">Lecciones Vistas</p>
                <p class="text-3xl font-bold">26 / 40</p>
            </div>
        </div>
    </section>
</body>
</html>
