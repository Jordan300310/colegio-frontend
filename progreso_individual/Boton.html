<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Componentes: Botones - Progreso Individual</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-10">
    <section class="max-w-xl mx-auto space-y-6">
        <h1 class="text-2xl font-bold uppercase mb-4">Botones de Progreso Individual</h1>
        <button class="w-full bg-black text-white border-2 border-black py-3 font-bold uppercase text-sm hover:bg-white hover:text-black transition-colors">
            Reporte PDF
        </button>
        <button class="w-full border-2 border-dashed border-black py-2 text-xs font-bold uppercase hover:bg-gray-100 transition-colors">
            + Agregar Comentario
        </button>
        <button class="w-full bg-black text-white px-6 py-2 font-bold uppercase text-sm hover:bg-gray-800 transition-colors">
            Guardar Nota
        </button>
    </section>
