<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Componentes: Botones - Gestión Usuarios</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-10">
    <section class="max-w-xl mx-auto space-y-6">
        <h1 class="text-2xl font-bold uppercase mb-4">Botones de Gestión</h1>
        <button class="w-full bg-black text-white border-2 border-black px-6 py-3 font-bold uppercase text-sm hover:bg-white hover:text-black transition-colors btn-wire shadow-[4px_4px_0_0_rgba(156,163,175,1)] flex items-center justify-center">
            <i class="fa-solid fa-plus mr-2"></i> Nuevo Usuario
        </button>
        <div class="grid grid-cols-2 gap-4">
            <button class="border-2 border-black text-black px-4 py-2 font-bold uppercase hover:bg-black hover:text-white transition-colors">Anterior</button>
            <button class="border-2 border-black text-black px-4 py-2 font-bold uppercase hover:bg-gray-200 transition-colors">Siguiente</button>
        </div>
        <div class="flex gap-2">
            <button class="w-8 h-8 border-2 border-black hover:bg-black hover:text-white transition-colors"><i class="fa-solid fa-user-pen"></i></button>
            <button class="w-8 h-8 border-2 border-black hover:bg-black hover:text-white transition-colors"><i class="fa-solid fa-key"></i></button>
        </div>
    </section>
</body>
</html>
