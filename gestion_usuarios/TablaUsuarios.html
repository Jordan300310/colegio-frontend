<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Componentes: Tabla de Usuarios</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-10">
    <section class="max-w-7xl mx-auto">
        <h1 class="text-2xl font-bold uppercase mb-4">Tabla de Usuarios</h1>
        <div class="bg-white border-2 border-black overflow-x-auto">
            <table class="w-full text-left border-collapse min-w-[800px]">
                <thead>
                    <tr class="bg-black text-white border-b-4 border-black uppercase text-xs tracking-widest">
                        <th class="px-6 py-4 border-r-2 border-gray-700">Usuario</th>
                        <th class="px-6 py-4 border-r-2 border-gray-700">Rol Actual</th>
                        <th class="px-6 py-4 border-r-2 border-gray-700">Estado</th>
                        <th class="px-6 py-4 border-r-2 border-gray-700">Último Acceso</th>
                        <th class="px-6 py-4 text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody class="text-sm">
                    <tr class="border-b-2 border-gray-300 hover:bg-gray-100 transition-colors">
                        <td class="px-6 py-4 border-r-2 border-gray-300">[Nombre Docente]</td>
                        <td class="px-6 py-4 border-r-2 border-gray-300"><span class="bg-gray-200 border-2 border-black px-2 py-1 text-xs font-bold uppercase">Docente</span></td>
                        <td class="px-6 py-4 border-r-2 border-gray-300"><span class="bg-black text-white px-2 py-1 text-xs font-bold uppercase">Activo</span></td>
                        <td class="px-6 py-4 border-r-2 border-gray-300">Hoy, 08:30 AM</td>
                        <td class="px-6 py-4 text-center space-x-2">
                            <button class="w-8 h-8 border-2 border-black hover:bg-black hover:text-white transition-colors"><i class="fa-solid fa-user-pen"></i></button>
                            <button class="w-8 h-8 border-2 border-black hover:bg-black hover:text-white transition-colors"><i class="fa-solid fa-key"></i></button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
</body>
</html>
