<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Componentes: Botones - Catálogo de Cursos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-10">
    <section class="max-w-xl mx-auto space-y-6">
        <h1 class="text-2xl font-bold uppercase mb-4">Botones de Catálogo</h1>
        <button class="w-full bg-black text-white border-2 border-black py-2 text-sm font-bold uppercase hover:bg-white hover:text-black transition-colors">
            Ingresar al Curso
        </button>
        <button class="w-full bg-white text-black border-2 border-black py-2 text-sm font-bold uppercase hover:bg-black hover:text-white transition-colors">
            Continuar Lección
        </button>
        <button class="w-full border-2 border-gray-400 text-gray-400 px-4 py-2 font-bold uppercase cursor-not-allowed">
            Anterior
        </button>
    </section>
</body>
</html>
