<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Componentes: Temario y Video - Visor de Lecciones</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-10">
    <section class="max-w-6xl mx-auto space-y-6">
        <h1 class="text-2xl font-bold uppercase mb-4">Temario y Reproductor</h1>
        <div class="grid lg:grid-cols-[280px_1fr] gap-6">
            <aside class="bg-gray-50 border-2 border-black p-4">
                <div class="border-b-2 border-black pb-4 mb-4">
                    <h2 class="font-bold uppercase">Módulo 1: Fundamentos</h2>
                </div>
                <nav class="space-y-2">
                    <a href="#" class="flex items-center p-3 border-2 border-gray-200 hover:border-black hover:bg-white text-gray-500">
                        <i class="fa-solid fa-circle-check mr-3"></i> Configuración del Entorno
                    </a>
                    <a href="#" class="flex items-center p-3 border-2 border-black bg-gray-100 font-bold">
                        <i class="fa-solid fa-circle-play mr-3"></i> Estructuras de Control
                    </a>
                </nav>
            </aside>
            <article class="bg-white border-2 border-black p-6">
                <div class="aspect-video border-4 border-black bg-gray-200 flex items-center justify-center text-6xl text-gray-800">
                    <i class="fa-solid fa-play"></i>
                </div>
                <div class="mt-4 flex justify-between items-center">
                    <span class="text-xs uppercase font-bold text-gray-500">[ Reproductor de Video ]</span>
                    <span class="text-xs uppercase font-bold">12:45</span>
                </div>
            </article>
        </div>
    </section>
</body>
</html>
