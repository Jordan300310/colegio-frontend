<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframe: Dashboard Alumno</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Tipografía genérica para dar aspecto de plano/borrador */
        body {
            font-family: 'Courier New', Courier, monospace;
        }
    </style>
</head>

<body class="p-4">
    <aside class="w-64 bg-white border-r-2 border-black flex flex-col hidden md:flex">
        <div class="p-6 border-b-2 border-black flex items-center space-x-3">
            <div class="w-8 h-8 border-2 border-black flex items-center justify-center font-bold">L</div>
            <span class="text-xl font-bold uppercase tracking-widest">[ LOGO ]</span>
        </div>

        <div class="p-6 flex items-center space-x-4 border-b-2 border-dashed border-gray-300">
            <div class="w-12 h-12 rounded-full border-2 border-black bg-gray-200 flex items-center justify-center">
                <i class="fa-regular fa-user"></i>
            </div>
            <div>
                <p class="text-sm font-bold uppercase">[ Nombre Alumno ]</p>
                <p class="text-xs text-gray-600">Perfil: Estudiante</p>
            </div>
        </div>

        <nav class="flex-1 px-4 space-y-4 mt-6">
            <a href="#"
                class="flex items-center space-x-3 bg-gray-200 border-2 border-black text-black px-4 py-3 font-bold">
                <i class="fa-solid fa-chart-pie w-5"></i>
                <span>Mi Progreso</span>
            </a>
            <a href="#"
                class="flex items-center space-x-3 text-gray-600 hover:text-black px-4 py-2 border-2 border-transparent hover:border-dashed hover:border-gray-400">
                <i class="fa-solid fa-book w-5"></i>
                <span>Catálogo Cursos</span>
            </a>
            <a href="#"
                class="flex items-center space-x-3 text-gray-600 hover:text-black px-4 py-2 border-2 border-transparent hover:border-dashed hover:border-gray-400">
                <i class="fa-solid fa-calendar-check w-5"></i>
                <span>Evaluaciones</span>
            </a>
        </nav>

        <div class="p-4 border-t-2 border-black">
            <a href="#" class="flex items-center space-x-3 text-gray-600 hover:text-black px-4 py-2">
                <i class="fa-solid fa-sign-out-alt w-5"></i>
                <span class="uppercase text-sm font-bold">Cerrar Sesión</span>
            </a>
        </div>
    </aside>
</body>

</html>
