<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframe: Dashboard Alumno</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Tipografía genérica para dar aspecto de plano/borrador */
        body {
            font-family: 'Courier New', Courier, monospace;
        }
    </style>
</head>

<body class="p-4">
    <div class="bg-white border-2 border-black p-5 relative">
        <div
            class="absolute top-0 right-0 bg-gray-200 border-b-2 border-l-2 border-black text-xs font-bold px-2 py-1 uppercase">
            Completado</div>
        <div class="mb-4 mt-2">
            <h3 class="font-bold text-lg uppercase">[ Módulo 1 ]</h3>
            <p class="text-sm text-gray-600">Fundamentos</p>
        </div>
        <button class="w-full py-2 border-2 border-black text-sm font-bold uppercase hover:bg-gray-100">Repasar</button>
    </div>
</body>

</html>
