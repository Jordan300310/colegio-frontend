<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Componentes: Botones - Avance Grupal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-10">
    <section class="max-w-xl mx-auto space-y-6">
        <h1 class="text-2xl font-bold uppercase mb-4">Botones de Avance Grupal</h1>
        <button class="w-full bg-black text-white border-2 border-black px-4 py-3 font-bold uppercase hover:bg-gray-800 transition-colors" title="Filtrar">
            <i class="fa-solid fa-filter mr-2"></i> Filtrar
        </button>
        <button class="border-2 border-black text-black px-4 py-3 font-bold uppercase hover:bg-gray-100 transition-colors">
            Ver todos los alumnos
        </button>
        <button class="border-2 border-gray-300 text-gray-400 px-4 py-2 font-bold uppercase cursor-not-allowed">
            No disponible
        </button>
    </section>
</body>
</html>
