<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Componentes: Métricas - Avance Grupal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-10">
    <section class="max-w-7xl mx-auto space-y-6">
        <h1 class="text-2xl font-bold uppercase mb-4">Métricas de Avance</h1>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 border-2 border-black">
                <p class="text-xs font-bold text-gray-500 uppercase mb-1 tracking-widest">Total Alumnos</p>
                <p class="text-4xl font-bold">32</p>
            </div>
            <div class="bg-white p-6 border-2 border-black">
                <p class="text-xs font-bold text-gray-500 uppercase mb-1 tracking-widest">Promedio Grupo</p>
                <p class="text-4xl font-bold">16.4 <span class="text-sm text-gray-400">/ 20</span></p>
            </div>
            <div class="bg-black text-white p-6 border-2 border-black relative overflow-hidden">
                <p class="text-xs font-bold text-gray-400 uppercase mb-1 tracking-widest">Alumnos Rezagados</p>
                <p class="text-4xl font-bold relative z-10">8</p>
                <p class="text-sm text-gray-400 uppercase">riesgo alto</p>
            </div>
        </div>
    </section>
</body>
</html>
