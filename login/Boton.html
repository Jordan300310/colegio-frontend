<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Componentes: Botones - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-10">
    <section class="max-w-xl mx-auto space-y-6">
        <h1 class="text-2xl font-bold uppercase mb-4">Botones de Login</h1>
        <button class="w-full bg-black text-white border-2 border-black py-4 font-bold uppercase tracking-widest hover:bg-white hover:text-black transition-colors btn-wire">
            Ingresar al Sistema
        </button>
        <button class="w-full bg-white text-black border-2 border-black px-6 py-3 font-bold uppercase text-sm hover:bg-gray-100 transition-colors flex items-center justify-center">
            <i class="fa-solid fa-download mr-2"></i> Enviar Instrucciones
        </button>
        <button class="w-full bg-gray-200 text-black border-2 border-black px-6 py-3 font-bold uppercase text-sm hover:bg-gray-300 transition-colors">
            Cancelar
        </button>
    </section>
</body>
</html>
