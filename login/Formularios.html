<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Componentes: Formularios - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-10">
    <section class="max-w-3xl mx-auto space-y-10">
        <article class="bg-white border-2 border-black p-8">
            <h2 class="text-xl font-bold uppercase mb-4">Formulario de Inicio de Sesión</h2>
            <div class="space-y-6">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest mb-2">Correo Institucional o Usuario</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">
                            <i class="fa-regular fa-envelope"></i>
                        </div>
                        <input type="email" placeholder="ejemplo@colegio.edu.pe" class="w-full border-2 border-black pl-10 pr-3 py-3 font-bold text-sm outline-none focus:border-dashed focus:bg-gray-50">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest mb-2">Contraseña</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">
                            <i class="fa-solid fa-lock"></i>
                        </div>
                        <input type="password" placeholder="••••••••" class="w-full border-2 border-black pl-10 pr-10 py-3 font-bold text-sm outline-none focus:border-dashed focus:bg-gray-50">
                        <div class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-500 hover:text-black cursor-pointer">
                            <i class="fa-regular fa-eye"></i>
                        </div>
                    </div>
                </div>
            </div>
        </article>
        <article class="bg-white border-2 border-black p-8">
            <h2 class="text-xl font-bold uppercase mb-4">Formulario de Recuperación</h2>
            <div class="space-y-6">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest mb-2">Correo Electrónico</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">
                            <i class="fa-regular fa-envelope"></i>
                        </div>
                        <input type="email" placeholder="Ingresa tu correo..." class="w-full border-2 border-black pl-10 pr-3 py-3 font-bold text-sm outline-none focus:border-dashed focus:bg-gray-50">
                    </div>
                </div>
            </div>
        </article>
    </section>
</body>
</html>
