<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Componentes: Botones - Generador de Reportes</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-10">
    <section class="max-w-xl mx-auto space-y-6">
        <h1 class="text-2xl font-bold uppercase mb-4">Botones de Reportes</h1>
        <button class="w-full border-4 border-black py-3 font-bold uppercase text-sm bg-white hover:bg-black hover:text-white transition-all btn-wire">
            Descargar .PDF
        </button>
        <button class="w-full border-4 border-black py-3 font-bold uppercase text-sm bg-white hover:bg-black hover:text-white transition-all btn-wire">
            Descargar .XLSX
        </button>
        <button class="w-full border-2 border-black py-3 font-bold uppercase text-sm hover:bg-gray-100 transition-colors">
            Re-descargar
        </button>
    </section>
</body>
</html>
