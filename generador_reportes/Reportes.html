<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Componentes: Reportes Recientes</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-10">
    <section class="max-w-7xl mx-auto space-y-6">
        <h1 class="text-2xl font-bold uppercase mb-4">Reportes Generados</h1>
        <div class="bg-white border-2 border-black overflow-hidden">
            <table class="w-full text-left border-collapse text-sm">
                <thead>
                    <tr class="bg-gray-200 border-b-2 border-black uppercase font-bold">
                        <th class="px-6 py-4 border-r-2 border-black">Fecha</th>
                        <th class="px-6 py-4 border-r-2 border-black">Tipo / Filtro</th>
                        <th class="px-6 py-4 border-r-2 border-black">Usuario</th>
                        <th class="px-6 py-4 text-center">Acción</th>
                    </tr>
                </thead>
                <tbody class="font-bold uppercase text-xs">
                    <tr class="border-b-2 border-gray-300">
                        <td class="px-6 py-4 border-r-2 border-gray-300 italic">13/04/2026</td>
                        <td class="px-6 py-4 border-r-2 border-gray-300">GRUPAL - SECC. 4TO "A"</td>
                        <td class="px-6 py-4 border-r-2 border-gray-300">PROF. [NOMBRE]</td>
                        <td class="px-6 py-4 text-center"><button class="border-b-2 border-black hover:text-gray-500 transition-colors">RE-DESCARGAR</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
</body>
</html>
