<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca de Componentes: Dropzone</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-10">
    <section class="max-w-4xl mx-auto space-y-8">
        <header>
            <h1 class="text-3xl font-bold uppercase mb-4">Zona de Arrastre</h1>
            <p class="text-sm text-gray-600">Componente reutilizable para cargas de archivos.</p>
        </header>

        <div
            class="dropzone border-4 border-dashed border-gray-400 bg-gray-50 hover:bg-gray-100 hover:border-black transition-all cursor-pointer flex flex-col items-center justify-center p-12 text-center group">
            <i class="fa-solid fa-file-csv text-6xl text-gray-400 group-hover:text-black mb-4"></i>
            <p class="font-bold uppercase text-lg mb-1">Arrastre su archivo aquí</p>
            <p class="text-xs font-bold text-gray-500 uppercase">O haga clic para examinar su equipo</p>
            <div class="mt-6 flex gap-2">
                <span
                    class="bg-gray-200 border border-gray-400 text-gray-600 px-2 py-1 text-[10px] font-bold uppercase">.XLSX</span>
                <span
                    class="bg-gray-200 border border-gray-400 text-gray-600 px-2 py-1 text-[10px] font-bold uppercase">.CSV</span>
            </div>
        </div>
    </section>
</body>

</html>
