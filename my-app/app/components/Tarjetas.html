<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca de Componentes: Cards</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-10">
    <section class="max-w-6xl mx-auto space-y-8">
        <header>
            <h1 class="text-3xl font-bold uppercase mb-4">Cards Reutilizables</h1>
            <p class="text-sm text-gray-600">Componentes de información con bordes, iconos y estados.</p>
        </header>

        <div class="grid gap-6 lg:grid-cols-2">
            <article class="bg-white p-6 border-2 border-black flex items-center justify-between">
                <div>
                    <p class="text-sm font-bold text-gray-600 uppercase mb-1">Avance Total</p>
                    <p class="text-4xl font-bold text-black">65%</p>
                </div>
                <div
                    class="w-16 h-16 rounded-full border-4 border-black border-dashed flex items-center justify-center">
                    <i class="fa-solid fa-chart-line text-xl"></i>
                </div>
            </article>

            <article class="bg-white border-2 border-black p-5 relative">
                <div
                    class="absolute top-0 right-0 bg-gray-200 border-b-2 border-l-2 border-black text-xs font-bold px-2 py-1 uppercase">
                    Activo</div>
                <h3 class="font-bold text-lg uppercase mb-2">[ Módulo ]</h3>
                <p class="text-sm text-gray-600 mb-4">Descripción breve del contenido del módulo.</p>
                <button
                    class="w-full py-2 border-2 border-black text-sm font-bold uppercase hover:bg-gray-100">Continuar</button>
            </article>
        </div>
    </section>
</body>

</html>
