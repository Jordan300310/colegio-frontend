<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca de Componentes: Campos de Formulario</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-10">
    <section class="max-w-4xl mx-auto space-y-8">
        <header>
            <h1 class="text-3xl font-bold uppercase mb-4">Campos de Formulario</h1>
            <p class="text-sm text-gray-600">Entradas, selects y controles compartidos entre formularios.</p>
        </header>

        <div class="space-y-6">
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest mb-2">Campo de texto</label>
                <input type="text" placeholder="Ej: Nombre"
                    class="w-full border-2 border-black p-3 font-bold uppercase bg-white focus:bg-gray-50 focus:outline-none">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest mb-2">Campo con ícono</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">
                        <i class="fa-regular fa-envelope"></i>
                    </div>
                    <input type="email" placeholder="ejemplo@colegio.edu.pe"
                        class="w-full border-2 border-black pl-10 pr-3 py-3 font-bold text-sm outline-none focus:bg-gray-50">
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest mb-2">Select</label>
                <select
                    class="w-full border-2 border-black p-3 font-bold uppercase bg-gray-100 focus:bg-white focus:outline-none cursor-pointer">
                    <option>[ Seleccione ]</option>
                    <option>Opción 1</option>
                </select>
            </div>
            <div class="grid gap-4 sm:grid-cols-2">
                <label class="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" class="w-4 h-4 accent-black border-2 border-black">
                    <span class="text-xs font-bold uppercase">Checkbox</span>
                </label>
                <label class="flex items-center gap-3 cursor-pointer">
                    <input type="radio" name="radio-example" class="w-4 h-4 accent-black border-2 border-black">
                    <span class="text-xs font-bold uppercase">Radio</span>
                </label>
            </div>
        </div>
    </section>
</body>

</html>
