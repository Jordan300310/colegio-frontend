<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca de Componentes: Tabla</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-10">
    <section class="max-w-6xl mx-auto space-y-8">
        <header>
            <h1 class="text-3xl font-bold uppercase mb-4">Tablas Reutilizables</h1>
            <p class="text-sm text-gray-600">Encabezados y filas con el estilo de borde que se usa en el proyecto.</p>
        </header>

        <div class="bg-white border-2 border-black overflow-x-auto">
            <table class="w-full text-left border-collapse min-w-[700px]">
                <thead>
                    <tr class="bg-gray-200 text-black border-b-2 border-black uppercase text-xs tracking-widest">
                        <th class="px-6 py-4 border-r-2 border-black">Columna 1</th>
                        <th class="px-6 py-4 border-r-2 border-black">Columna 2</th>
                        <th class="px-6 py-4 border-r-2 border-black">Columna 3</th>
                        <th class="px-6 py-4">Acción</th>
                    </tr>
                </thead>
                <tbody class="text-sm font-bold uppercase">
                    <tr class="border-b-2 border-gray-300 hover:bg-gray-100 transition-colors">
                        <td class="px-6 py-4 border-r-2 border-gray-300">Dato 1</td>
                        <td class="px-6 py-4 border-r-2 border-gray-300">Dato 2</td>
                        <td class="px-6 py-4 border-r-2 border-gray-300">Dato 3</td>
                        <td class="px-6 py-4">Acción</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
</body>

</html>
