<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca de Componentes: Badges</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-10">
    <section class="max-w-3xl mx-auto space-y-8">
        <header>
            <h1 class="text-3xl font-bold uppercase mb-4">Badges Reutilizables</h1>
            <p class="text-sm text-gray-600">Etiquetas de estado y categorías usadas en tablas y tarjetas.</p>
        </header>

        <div class="flex flex-wrap gap-4">
            <span class="bg-black text-white px-3 py-2 text-xs font-bold uppercase">Activo</span>
            <span class="bg-gray-200 text-black px-3 py-2 text-xs font-bold uppercase">Pendiente</span>
            <span class="bg-white border-2 border-black px-3 py-2 text-xs font-bold uppercase">Alumno</span>
            <span class="bg-gray-200 border-2 border-black px-3 py-2 text-xs font-bold uppercase">Docente</span>
            <span class="bg-gray-100 text-gray-600 px-3 py-2 text-xs font-bold uppercase">Inactivo</span>
        </div>
    </section>
</body>
</html>
