<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Componentes: Tabla de Asignaciones</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-10">
    <section class="max-w-7xl mx-auto">
        <h1 class="text-2xl font-bold uppercase mb-4">Tabla de Asignaciones</h1>
        <div class="bg-white border-2 border-black overflow-x-auto">
            <table class="w-full text-left border-collapse min-w-[700px]">
                <thead>
                    <tr class="bg-gray-200 text-black border-b-4 border-black uppercase text-xs tracking-widest">
                        <th class="px-6 py-4 border-r-2 border-gray-400">Docente Titular</th>
                        <th class="px-6 py-4 border-r-2 border-gray-400">Curso / Sección</th>
                        <th class="px-6 py-4 border-r-2 border-gray-400 text-center">Fecha</th>
                        <th class="px-6 py-4 text-center">Desvincular</th>
                    </tr>
                </thead>
                <tbody class="text-sm">
                    <tr class="border-b-2 border-gray-300 hover:bg-gray-50 transition-colors">
                        <td class="px-6 py-4 border-r-2 border-gray-300 font-bold uppercase">[ LIC. ANA RAMÍREZ ]</td>
                        <td class="px-6 py-4 border-r-2 border-gray-300">3RO "A" - LÓGICA DIGITAL</td>
                        <td class="px-6 py-4 border-r-2 border-gray-300 text-center text-xs text-gray-500 uppercase">01/03/2026</td>
                        <td class="px-6 py-4 text-center"><button class="border-2 border-black px-3 py-1 text-xs font-bold uppercase">Desvincular</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
</body>
</html>
