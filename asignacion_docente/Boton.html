<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Componentes: Botones - Asignación Docente</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-10">
    <section class="max-w-xl mx-auto space-y-6">
        <h1 class="text-2xl font-bold uppercase mb-4">Botones de Asignación</h1>
        <button class="w-full bg-black text-white border-2 border-black px-8 py-3 font-bold uppercase text-sm tracking-widest hover:bg-white hover:text-black transition-colors btn-wire">
            Confirmar Asignación
        </button>
        <button class="w-full border-2 border-black px-6 py-3 font-bold uppercase text-sm hover:bg-gray-100 transition-colors">
            Cambiar Profesor
        </button>
        <button class="w-full border-2 border-gray-300 text-gray-500 px-6 py-3 font-bold uppercase cursor-not-allowed">
            Selección Deshabilitada
        </button>
    </section>
</body>
</html>
