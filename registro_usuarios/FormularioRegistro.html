<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Componentes: Formulario de Registro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-10">
    <section class="max-w-4xl mx-auto space-y-8">
        <h1 class="text-2xl font-bold uppercase mb-4">Formulario de Usuario</h1>
        <div class="bg-white border-2 border-black p-8 space-y-8">
            <div>
                <h2 class="text-lg font-bold uppercase mb-4">1. Datos Personales</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <input type="text" placeholder="Nombres" class="w-full border-2 border-black p-3 font-bold uppercase bg-white focus:bg-gray-50 focus:outline-none">
                    <input type="text" placeholder="Apellidos" class="w-full border-2 border-black p-3 font-bold uppercase bg-white focus:bg-gray-50 focus:outline-none">
                </div>
                <div class="mt-6 relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">
                        <i class="fa-regular fa-envelope"></i>
                    </div>
                    <input type="email" placeholder="Correo Institucional" class="w-full border-2 border-black pl-10 pr-3 py-3 font-bold uppercase text-sm outline-none focus:border-dashed focus:bg-gray-50">
                </div>
            </div>
            <div>
                <h2 class="text-lg font-bold uppercase mb-4">2. Configuración de Acceso</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <select class="w-full border-2 border-black p-3 font-bold uppercase bg-gray-100 focus:bg-white focus:outline-none cursor-pointer">
                        <option>[ SELECCIONE UN ROL ]</option>
                        <option>ALUMNO</option>
                        <option>DOCENTE</option>
                        <option>ADMINISTRADOR</option>
                    </select>
                    <div class="bg-gray-50 border-2 border-black p-4">
                        <label class="flex items-center cursor-pointer">
                            <input type="radio" name="password_type" class="mt-1 w-4 h-4 accent-black border-2 border-black mr-3" checked>
                            <span class="font-bold uppercase text-sm">Generar Automáticamente</span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
