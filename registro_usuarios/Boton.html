<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Componentes: Botones - Registro de Usuarios</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-10">
    <section class="max-w-xl mx-auto space-y-6">
        <h1 class="text-2xl font-bold uppercase mb-4">Botones de Registro</h1>
        <button class="w-full bg-black text-white border-2 border-black px-10 py-3 font-bold uppercase text-sm tracking-widest hover:bg-gray-800 transition-colors btn-wire shadow-[4px_4px_0_0_rgba(156,163,175,1)] flex items-center justify-center">
            <i class="fa-solid fa-user-plus mr-2"></i> Registrar Usuario
        </button>
        <button class="w-full bg-white text-black border-2 border-black px-8 py-3 font-bold uppercase text-sm hover:bg-gray-100 transition-colors">
            Cancelar
        </button>
    </section>
</body>
</html>
