<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Componentes: Botones - Perfil</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-10">
    <section class="max-w-xl mx-auto space-y-6">
        <h1 class="text-2xl font-bold uppercase mb-4">Botones de Perfil</h1>
        <button class="w-full bg-black text-white border-4 border-black py-3 font-bold uppercase text-sm hover:bg-gray-800 transition-colors btn-wire shadow-[4px_4px_0_0_rgba(156,163,175,1)]">
            Guardar Datos Personales
        </button>
        <button class="w-full bg-black text-white border-4 border-black py-3 font-bold uppercase text-sm hover:bg-gray-800 transition-colors btn-wire shadow-[4px_4px_0_0_rgba(156,163,175,1)]">
            Actualizar Contraseña
        </button>
        <button class="border-2 border-black p-3 hover:bg-black hover:text-white transition-colors">
            Enviar Mensaje
        </button>
    </section>
</body>
</html>
